
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Viewer</title>

<style>
:root {
    --bg: #f4f1ea;
    --panel: #ffffff;
    --ink: #1f2421;
    --muted: #6b6f6c;
    --accent: #b5532c;
    --border: #e3ded2;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
}

.logo {
    max-width: 180px;
    max-height: 100px;
    object-fit: contain;
    margin-bottom: 24px;
}

.panel {
    width: 100%;
    max-width: 720px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
}

h1 {
    font-size: 18px;
    margin: 0 0 4px;
}

.hint {
    margin: 0 0 20px;
    color: var(--muted);
    font-size: 14px;
}

.row {
    display: flex;
    gap: 10px;
}

input[type="text"] {
    flex: 1;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 6px;
    outline: none;
}

input[type="text"]:focus {
    border-color: var(--accent);
}

button {
    padding: 10px 18px;
    font-size: 15px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.error {
    color: var(--accent);
    font-size: 14px;
    margin-top: 10px;
    display: none;
}

.viewer-wrap {
    width: 100%;
    max-width: 720px;
    margin-top: 20px;
    display: none;
}

.viewer-wrap iframe {
    width: 100%;
    height: 70vh;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #fff;
}

.filename-label {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 8px;
}
</style>
</head>

<body>

<img class="logo" src="logo.png" alt="Logo">

<div class="panel">
    <h1>Open a PDF</h1>

    <p class="hint">
       رقم الهوية
    </p>

    <div class="row">
        <input
            type="text"
            id="pdfName"
            placeholder="report"
            autocomplete="off"
        />
        <button onclick="loadPdf()">Load</button>
    </div>

    <div class="error" id="errorMsg">
        File not found. Check the filename and try again.
    </div>
</div>

<div class="viewer-wrap" id="viewerWrap">
    <div class="filename-label" id="filenameLabel"></div>
    <iframe id="pdfFrame"></iframe>
</div>

<script>
const FOLDER = "files/";

function loadPdf() {
    const input = document.getElementById("pdfName");
    const errorMsg = document.getElementById("errorMsg");
    const viewerWrap = document.getElementById("viewerWrap");
    const pdfFrame = document.getElementById("pdfFrame");
    const filenameLabel = document.getElementById("filenameLabel");

    const name = input.value.trim();

    if (!name) {
        viewerWrap.style.display = "none";
        return;
    }

    const filename = name + ".pdf";
    const path = FOLDER + filename;

    fetch(path, { method: "HEAD" })
        .then((res) => {
            if (!res.ok) {
                throw new Error("File not found");
            }

            errorMsg.style.display = "none";
            filenameLabel.textContent = filename;
            pdfFrame.src = path;
            viewerWrap.style.display = "block";
        })
        .catch(() => {
            errorMsg.style.display = "block";
            viewerWrap.style.display = "none";
        });
}

document
    .getElementById("pdfName")
    .addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
            loadPdf();
        }
    });
</script>

</body>
</html>
